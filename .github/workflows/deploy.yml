name: Deploy to Server

on:
  push:
    branches:
      - master  # Dieser Workflow wird bei jedem Push zum `main`-Branch ausgelöst

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout des Codes
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. SSH-Schlüssel hinzufügen
      - name: Add SSH Key
        run: |
          mkdir -p /home/runner/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts
        shell: bash

      # 3. Deployment per SCP (Secure Copy)
      - name: Deploy to Server via SCP
        run: |
          scp -r ./* ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/home/github/
        shell: bash
