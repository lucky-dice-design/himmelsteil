name: Deploy Hugo Website to Server

on:
  push:
    branches:
      - master  # Der Workflow wird ausgelöst, wenn auf den Branch `master` gepusht wird

jobs:
  build-and-deploy:
    name: Build and Deploy Hugo Website
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout des Codes
      - name: Checkout Code
        uses: actions/checkout@v3

      # 2. Installiere Hugo
      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: "latest"

      # 3. Baue die Hugo-Website
      - name: Build Hugo Website
        run: hugo --gc --minify

      # 4. SSH-Key hinzufügen
      - name: Add SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/github_repo_key
          chmod 600 ~/.ssh/github_repo_key
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts
        shell: bash

      # 5. Deploy to Server via SCP
      - name: Deploy to Server
        run: |
          scp -r ./public/* ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/var/www/vhosts/himmelsteil.com/
