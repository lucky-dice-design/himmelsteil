name: Deploy Hugo Website to Plesk

on:
  push:
    branches:
      - master  # Der Workflow wird ausgelöst, wenn auf den Branch `master` gepusht wird

jobs:
  build-and-deploy:
    name: Build and Deploy Hugo Website
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout des Codes
      - name: Checkout Code
        uses: actions/checkout@v3

      # 2. Installiere Hugo
      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: "latest"

      # 3. Baue die Hugo-Website
      - name: Build Hugo Website
        run: hugo

      # 4. Installiere sshpass (für Passwort-Login)
      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      # 5. Deployment via SCP mit Passwort
      - name: Deploy to Server via SCP
        run: |
          echo "Deploying files via SCP with password authentication"
          sshpass -p "${{ secrets.SSH_PASSWORD }}" scp -r -o StrictHostKeyChecking=no ./public/* root@212.227.161.13:/var/www/vhosts/himmelsteil.com/httpdocs/
